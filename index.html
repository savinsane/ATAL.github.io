<!DOCTYPE html>
<html>
<head>
    <title>Abhishek | Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        header {
            padding: 20px;
            font-size: 28px;
            background: #111;
        }

        .container {
            padding: 50px;
        }

        h1 {
            font-size: 50px;
        }

        .typing {
            color: #00ffcc;
            font-size: 22px;
            margin-top: 10px;
            height: 30px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background: #00ffcc;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.2);
        }

        img {
            width: 150px;
            border-radius: 50%;
            margin-top: 20px;
        }

        .card {
            margin: 20px auto;
            width: 250px;
            padding: 20px;
            border-radius: 15px;
            background: #111;
        }

        footer {
            margin-top: 40px;
            padding: 10px;
            background: #111;
        }
    </style>
</head>

<body>

<header>
    🚀 My Portfolio
</header>

<div class="container">

    <h1>Hi, I'm Abhishek 👋</h1>

    <!-- Typing Animation -->
    <div class="typing" id="typing"></div>

    <!-- Profile Image -->
    <img src="https://via.placeholder.com/150" alt="profile">

    <br>
    <button class="btn" onclick="showMessage()">Click Me</button>

    <div class="card">
        <h3>💻 Skills</h3>
        <p>Python, HTML, CSS</p>
    </div>

    <div class="card">
        <h3>📚 Projects</h3>
        <p>Websites & Mini Projects</p>
    </div>

</div>

<footer>
    © 2026 Abhishek
</footer>

<script>
const text = "BTech Student | Web Developer | Learning AI";
let i = 0;

function typingEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect, 50);
    }
}

typingEffect();

function showMessage() {
    alert("🔥 Welcome to my advanced website!");
}
</script>

</body>
</html>
